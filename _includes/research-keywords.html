{% assign keywords = include.keywords | split: "|" %}

{% if keywords.size > 0 %}
  <div class="tags">
    {% for keyword in keywords %}
      {% assign clean_keyword = keyword | strip %}
      {% if clean_keyword != "" %}
        <span class="tag">
          {{ clean_keyword }}
        </span>
      {% endif %}
    {% endfor %}
  </div>
{% endif %}
